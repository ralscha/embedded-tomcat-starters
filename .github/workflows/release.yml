name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build release artifacts
        run: mvn -B -ntp clean package

      - name: Collect jars
        run: |
          mkdir -p dist
          cp tomcat9/target/embedded-tomcat-starter-tomcat9-*.jar dist/
          cp tomcat10/target/embedded-tomcat-starter-tomcat10-*.jar dist/
          cp tomcat11/target/embedded-tomcat-starter-tomcat11-*.jar dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: embedded-tomcat-starters
          path: dist/*.jar

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.jar
          generate_release_notes: true
